<section class="contact-section">
    <div class="contact-container">
        
        <div class="contact-info">
            <h1>Hablemos</h1>
            <p>¿Tienes alguna duda o quieres planear tu próxima escapada? Escríbenos y nuestro equipo te atenderá de inmediato para ofrecerte la mejor experiencia.</p>

            <div class="info-items">
                <div class="item">
                    <i class="fa-solid fa-envelope"></i>
                    <span>info@quintascolombia.com</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-phone"></i>
                    <span>+57 320 915 8042</span>
                </div>
                <div class="item">
                    <i class="fa-solid fa-location-dot"></i>
                    <span>Bogotá, Colombia</span>
                </div>
            </div>

            <div class="social-links">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>

        <div class="contact-form-wrapper">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" placeholder="Tu nombre">
                </div>
                
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@ejemplo.com">
                </div>
                
                <div class="form-group">
                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" placeholder="+57...">
                </div>
                
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                </div>
                
                <button type="button" class="btn-submit">Enviar Mensaje</button>
            </form>
        </div>
    </div>
</section>
