<div class="page-edit">
    <div class="edit-container">
        <a routerLink="/dashboard" class="regresar-home">
            <span class="arrow">&larr;</span>
            Volver al Dashboard
        </a>
        <h1 class="edit-title">Editar Usuario</h1>

        <form class="edit-form" [formGroup]="formData" (ngSubmit)="onSubmit()">

            <!-- Nombre completo -->
            <div class="field-wrapper">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <input type="text" formControlName="fullName" placeholder="Nombre completo" class="form-input">
                </div>
            </div>

            <!-- Username -->
            <div class="field-wrapper">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
                    </svg>
                    <input type="text" formControlName="username" placeholder="Nombre de usuario" class="form-input">
                </div>
            </div>

            <!-- Email -->
            <div class="field-wrapper">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                    </svg>
                    <input type="email" formControlName="email" placeholder="Correo electrónico" class="form-input">
                </div>
            </div>

            <!-- Teléfono -->
            <div class="field-wrapper">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
                    </svg>
                    <input type="text" formControlName="phone" placeholder="Teléfono" class="form-input">
                </div>
            </div>

            <!-- Roles (solo visible para Admin) -->
            <div *ngIf="isAdmin" class="roles-section" formArrayName="roles">
                <span class="section-label">Roles</span>
                <div class="roles-grid">
                    <label *ngFor="let role of rolesList; let i = index" class="role-checkbox">
                        <input type="checkbox" [formControlName]="i">
                        <span class="role-name">{{ role }}</span>
                    </label>
                </div>
            </div>

            <!-- Estado (solo visible para Admin) -->
            <div *ngIf="isAdmin" class="status-section">
                <span class="section-label">Estado</span>
                <div class="status-options">
                    <label class="status-radio">
                        <input type="radio" [value]="true" formControlName="isActive">
                        <span class="status-name">Activo</span>
                    </label>
                    <label class="status-radio">
                        <input type="radio" [value]="false" formControlName="isActive">
                        <span class="status-name">Inactivo</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-button">Guardar cambios</button>

            <!-- Solicitar rol (solo visible si es su propio perfil) -->
            <div *ngIf="isOwnProfile" class="request-role-section">
                <div class="divider"></div>
                <button type="button" (click)="solicitarCambioRol()" class="request-button">
                    <svg viewBox="0 0 24 24" fill="currentColor" class="request-icon">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    Solicitar ser Propietario
                </button>
            </div>
        </form>
    </div>
</div>
