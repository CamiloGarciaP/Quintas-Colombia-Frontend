<h2>Editar Usuario</h2>

<form [formGroup]="formData" (ngSubmit)="onSubmit()">

    <input type="text" formControlName="fullName" placeholder="Nombre completo">
    <input type="text" formControlName="username" placeholder="Usuario">
    <input type="email" formControlName="email" placeholder="Email">
    <input type="text" formControlName="phone" placeholder="Teléfono">

    <div formArrayName="roles">
        <label>Roles:</label>
        <div *ngFor="let role of rolesList; let i = index">
            <label>
                <input type="checkbox" [formControlName]="i">
                {{ role }}
            </label>
        </div>
    </div>

    <label>
        <input type="radio" [value]="true" formControlName="isActive"> Activo
    </label>
    <label>
        <input type="radio" [value]="false" formControlName="isActive"> Inactivo
    </label>

    <button type="submit">Guardar cambios</button>

    <div *ngIf="isOwnProfile" class="mt-3">
    <button type="button" (click)="solicitarCambioRol()" class="btn btn-warning">
        Solicitar ser Propietario
    </button>
</div>
</form>
