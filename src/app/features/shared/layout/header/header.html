<header class="header">
    <div class="top-header">

        <!-- Icono Hamburguesa (solo móvil) -->
        <button class="hamburger" (click)="toggleMenu()">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <!-- Logo de Quintas Colombia -->
        <div class="Logo">
            <a routerLink="/">
                <img class="img-Logo" src="assets/images/Logo.svg" alt="Quintas Colombia">
            </a>
        </div>
        

        <!-- Menú de navegación (Desktop) -->
        <nav class="menu">
            <ul class="list">
                <li>
                    <a routerLink="/" routerLinkActive="active">Inicio</a>
                </li>
                <li>
                    <a routerLink="/properties" routerLinkActive="active">Propiedades</a>
                </li>
                <li>
                    <a routerLink="/contact" routerLinkActive="active">Contacto</a>
                </li>
            </ul>
        </nav>

        <!-- Login / Logout -->
        <div class="right">
            <a *ngIf="!isLoggedIn" routerLink="/login" class="btn-login">Login</a>
            <button *ngIf="isLoggedIn" class="btn-logout" (click)="logout()">Cerrar Sesión</button>
        </div>

    </div>

    <!-- Menú móvil desplegable -->
    <nav class="mobile-menu" [class.active]="isMenuOpen">
        <ul class="mobile-list">
            <li>
                <a routerLink="/" (click)="closeMenu()">Inicio</a>
            </li>
            <li>
                <a routerLink="/properties" (click)="closeMenu()">Propiedades</a>
            </li>
            <li>
                <a routerLink="/contact" (click)="closeMenu()">Contacto</a>
            </li>
            <li *ngIf="!isLoggedIn">
                <a routerLink="/login" (click)="closeMenu()">Login</a>
            </li>
            <li *ngIf="isLoggedIn">
                <a (click)="logout(); closeMenu()" class="logout-link">Cerrar Sesión</a>
            </li>
        </ul>
    </nav>
</header>
